name: nightly-release

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    if: ${{ !github.event.repository.fork }}
    runs-on: ubuntu-latest
    env:
      REVISION : ''
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Assets
        run: |
          export REVISION=`git describe --match "v*.*" --always`
          cd ..
          ln -s ${{ github.event.repository.name }} ${{ github.event.repository.name }}-$REVISION
          zip ${{ github.event.repository.name }}/${{ github.event.repository.name }}-nightly.zip ${{ github.event.repository.name }}-$REVISION -r -x '*/.git/*'
          rm -f ${{ github.event.repository.name }}-$REVISION

      - uses: pyTooling/Actions/releaser@r0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          files: ${{ github.event.repository.name }}-nightly.zip
