name: on-release

on:
  workflow_dispatch:
  push: # run only on push tags
    tags:
      - 'v*.*.*' # Trigger on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REVISION : ''
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build Assets
        run: |
          export REVISION=`git describe --match "v*.*" --always`
          cd ..
          ln -s ${{ github.event.repository.name }} ${{ github.event.repository.name }}-$REVISION
          zip ${{ github.event.repository.name }}/${{ github.event.repository.name }}-nightly.zip ${{ github.event.repository.name }}-$REVISION -r -x '*/.git/*'
          rm -f ${{ github.event.repository.name }}-$REVISION
      - name: Upload Release Assets
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v3
        with:
          files: '*src-with-submodules.zip'
