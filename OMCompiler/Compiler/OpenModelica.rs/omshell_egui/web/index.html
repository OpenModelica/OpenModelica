<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>OMShell (egui)</title>
  <style>
    html, body { overflow: hidden; margin: 0; padding: 0; height: 100%; width: 100%; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="the_canvas_id"></canvas>
  <!--
    cmake-driven launcher (no trunk). Two wasm modules load here:
      * ./omc/  — the compiler (libopenmodelica_compiler, web target)
      * ./pkg/  — this GUI (omshell_egui)
    The omc module is instantiated first and its interactive API published on
    globalThis.__omc; omc_bridge.js (bundled into the GUI) forwards to it, so the
    GUI's backend drives omc in-process. Then the GUI's init() runs main().
  -->
  <script type="module">
    import omcInit, { omc_set_env, omc_init, omc_eval } from './omc/OpenModelicaCompiler.js';
    import guiInit from './OMShell-egui/OMShell-egui.js';

    (async () => {
      await omcInit();
      omc_set_env('OPENMODELICAHOME', '/usr'); // builtins resolve by basename
      globalThis.__omc = { omc_init, omc_eval, omc_set_env };
      await guiInit();
    })().catch((e) => {
      document.body.innerHTML = '<pre style="color:#f48771">Startup error: ' + e + '</pre>';
    });
  </script>
</body>
</html>
