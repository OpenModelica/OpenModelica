[package]
name = "omshell_dioxus"
version = "0.1.0"
edition = "2024"

# Dioxus front-end for OMShell. The same RSX builds for three targets:
#   web     (`--features web`, default)            wasm, dioxus-web
#   native  (`--no-default-features --features native`)  Blitz (dioxus-native)
#   desktop (`--no-default-features --features desktop`) a system webview
# The native build uses Blitz so the Help -> WebGPU test can composite a real
# wgpu scene (a webview cannot); see src/blitz_demo.rs.
# Branded binary name (matches omshell_egui's OMShell-egui).
[[bin]]
name = "OMShell-dioxus"
path = "src/main.rs"

[features]
default = ["web"]
web = ["dioxus/web", "dep:omshell_wgpu", "dep:wgpu"]
desktop = ["dioxus/desktop"]
native = [
    "dep:omshell_wgpu",
    "dep:wgpu",
    "dep:dioxus-native",
    "dep:blitz-dom",
    "dep:blitz-paint",
    "dep:blitz-traits",
    "dep:anyrender",
    "dep:wgpu_context",
    "dep:peniko",
]

[dependencies]
dioxus = "0.7"
omshell_core = { path = "../omshell_core" }
# The real OMC backend: the compiler linked in-process on native, the omc wasm
# module's JS exports on web.
omshell_omc = { path = "../omshell_omc" }

# Shared WebGPU demo renderer (Help -> WebGPU test). Used by both the web canvas
# path and the native Blitz custom-widget path, so it is enabled by either feature.
omshell_wgpu = { path = "../omshell_wgpu", optional = true }
wgpu = { version = "29", optional = true }

# Blitz (dioxus-native): the native renderer plus its custom-widget API, which
# composites our wgpu texture into Blitz's scene. Git-pinned to the rev of the
# wgpu_texture example this is adapted from (the custom-widget API is pre-1.0).
# `vello-hybrid` is the wgpu renderer backend (it provides the DeviceHandle the
# custom widget renders with); `system-fonts` uses the OS fonts and needs
# fontconfig at build time (libfontconfig-dev — the OM build env already has it).
dioxus-native = { git = "https://github.com/DioxusLabs/blitz", rev = "2003ba5fc2d8931da9213ef26a813b0d24c83ca6", default-features = false, features = ["system-fonts", "prelude", "vello-hybrid"], optional = true }
blitz-dom = { git = "https://github.com/DioxusLabs/blitz", rev = "2003ba5fc2d8931da9213ef26a813b0d24c83ca6", default-features = false, features = ["custom-widget"], optional = true }
blitz-paint = { git = "https://github.com/DioxusLabs/blitz", rev = "2003ba5fc2d8931da9213ef26a813b0d24c83ca6", default-features = false, features = ["custom-widget"], optional = true }
blitz-traits = { git = "https://github.com/DioxusLabs/blitz", rev = "2003ba5fc2d8931da9213ef26a813b0d24c83ca6", default-features = false, optional = true }
anyrender = { version = "0.11.0", optional = true }
wgpu_context = { version = "0.6.0", optional = true }
peniko = { version = "0.6.0", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-timers = { version = "0.3", features = ["futures"] }
# Help -> WebGPU test (web): grab the <canvas> from the DOM and render the shared
# demo on a wgpu surface.
wasm-bindgen = "=0.2.125"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3.102", features = ["Window", "Document", "Element", "HtmlCanvasElement", "Performance"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# Runtime-agnostic timer: the dioxus webview / Blitz event loops don't run a
# Tokio runtime with the time driver where use_future's task is polled, so a
# tokio timer panics with "no reactor running". futures-timer uses its own
# background thread and needs no reactor.
futures-timer = "3"
