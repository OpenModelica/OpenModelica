[package]
name = "openmodelica_script_util"
version = "0.1.0"
edition = "2024"

[dependencies]
openmodelica_vfs.workspace = true
openmodelica_error.workspace = true
metamodelica.workspace = true
openmodelica_ast.workspace = true
openmodelica_frontend_types.workspace = true
openmodelica_frontend_dump.workspace = true
openmodelica_util.workspace = true
openmodelica_util_datatypes_basic.workspace=true
anyhow.workspace = true
const-str.workspace=true
arcstr.workspace=true
loop_unwrap.workspace=true
match_deref.workspace=true
zip = { version = "8.6.0", default-features = false, features = ["deflate"] }

# Native libcurl (downloads) has no wasm target; Curl.rs is replaced by the
# Curl_wasm.rs implementation on wasm, so the dep is native-only.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
curl.workspace = true

# On wasm, Curl_wasm.rs downloads via the browser (synchronous XMLHttpRequest)
# and stages the bytes in the VFS.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "=0.2.100"
js-sys = "0.3.77"
web-sys = { version = "0.3.77", features = ["XmlHttpRequest"] }
