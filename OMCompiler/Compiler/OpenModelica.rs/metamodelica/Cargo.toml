[package]
name = "metamodelica"
version = "0.1.0"
edition = "2024"

[dependencies]
metamodelica_derive = { path = "../metamodelica_derive" }
anyhow.workspace=true
arcstr.workspace=true
ordered-float.workspace=true
num-traits.workspace=true
# `clock()` reads the monotonic clock here (wasm-safe; std::time::Instant::now
# panics on wasm32-unknown-unknown). No workspace deps of its own → no cycle.
openmodelica_wasi.workspace = true
