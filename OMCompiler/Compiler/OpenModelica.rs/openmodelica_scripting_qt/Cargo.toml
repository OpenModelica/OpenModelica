[package]
name = "openmodelica_scripting_qt"
version = "0.1.0"
edition = "2024"

# The typed OMEdit interface (OpenModelicaScriptingAPIQt) for the Rust port: the
# `extern "C"` wrappers behind the Qt `OMCInterface`, generated by mmtorust into
# `src/scripting_api_qt.rs` plus the companion C++ in `qt/`. Kept a separate
# crate so the `openmodelica` binary never compiles it (only the
# `libOpenModelicaCompiler` cdylib, which OMEdit links, depends on it).
[lib]
name = "openmodelica_scripting_qt"

[dependencies]
openmodelica_backend_main.workspace = true
arcstr.workspace = true
metamodelica.workspace = true

# wasm worker-side ABI dispatch (omc_abi_dispatch) marshals the OMEdit calls as
# JSON; only the wasm build's bridge needs it (native OMEdit links the C ABI
# directly), so it is wasm-only.
[target.'cfg(target_arch = "wasm32")'.dependencies]
serde_json.workspace = true
