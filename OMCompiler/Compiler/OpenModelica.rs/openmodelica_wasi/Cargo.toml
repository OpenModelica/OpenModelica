[package]
name = "openmodelica_wasi"
version = "0.1.0"
edition = "2024"

# In-memory virtual filesystem for the wasm build (wasm32 has no OS filesystem).
# Holds the embedded builtin Modelica/MetaModelica sources plus any files the JS
# host or the running compiler write at runtime. No dependency on the rest of the
# workspace so the lowest-level crates (openmodelica_ast, openmodelica_util) can
# route their file I/O through it.
[dependencies]
# Real entropy for the WASI random_get (native: OS RNG). On wasm the JS backend
# is selected via `--cfg getrandom_backend="wasm_js"` in .cargo/config.toml plus
# the `wasm_js` feature added in the wasm32 target table below.
getrandom = "0.3"

[target.'cfg(target_arch = "wasm32")'.dependencies]
# Real SystemTime over the JS clock (`Date.now`) for store modification times;
# std::time::SystemTime::now() panics on wasm32-unknown-unknown. Other targets
# (native, wasip1) use std directly. Mirrors openmodelica_util.
web-time = "1"
# getrandom's JS backend (Web Crypto) for random_get; cf. the wasm32 cfg above.
getrandom = { version = "0.3", features = ["wasm_js"] }
